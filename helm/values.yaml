replicaCount: 1

image:
  backend:
    repository: tharunidayara/dclaw-time-calculator-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: tharunidayara/dclaw-time-calculator-frontend
    tag: latest
    pullPolicy: IfNotPresent

service:
  backend:
    type: ClusterIP
    port: 8095
  frontend:
    type: ClusterIP
    port: 3006

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: time-calc.local
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Override in production — matches the secret in secrets.yaml
database:
  url: "postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_timecalc"
