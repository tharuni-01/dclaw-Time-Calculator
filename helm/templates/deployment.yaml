apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dclaw-app.fullname" . }}-backend
  labels:
    app: {{ include "dclaw-app.name" . }}
    component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dclaw-app.name" . }}
      component: backend
  template:
    metadata:
      labels:
        app: {{ include "dclaw-app.name" . }}
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8095
          envFrom:
            - secretRef:
                name: {{ include "dclaw-app.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health/
              port: 8095
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/
              port: 8095
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dclaw-app.fullname" . }}-frontend
  labels:
    app: {{ include "dclaw-app.name" . }}
    component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dclaw-app.name" . }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ include "dclaw-app.name" . }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 3006
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
